name: Build Android

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true

permissions:
  contents: read

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve package version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^version:[[:space:]]*([^+[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          if [ -z "$version" ]; then
            echo "Could not find version in pubspec.yaml" >&2
            exit 1
          fi
          package_name="LightSend-$version-android-arm64-v8a.apk"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=$package_name" >> "$GITHUB_ENV"
          echo "app_version=$version" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Restore Android keystore
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing" >&2
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          {
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Build Android release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Package Android release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/$PACKAGE_NAME"

      - name: Upload Android package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.package_name }}
          path: dist/${{ steps.meta.outputs.package_name }}
          if-no-files-found: error
          archive: false
