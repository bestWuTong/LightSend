name: Build Windows

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve package version
        id: meta
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' | Select-Object -First 1
          if (-not $versionLine) {
            throw 'Could not find version in pubspec.yaml'
          }
          $version = $versionLine.Matches[0].Groups[1].Value.Trim() -replace '\+.*$', ''
          $packageName = "LightSend-$version-windows-x64.zip"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PACKAGE_NAME=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "package_name=$packageName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Analyze
        run: flutter analyze

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows release
        shell: pwsh
        run: |
          $source = 'build/windows/x64/runner/Release'
          if (-not (Test-Path $source)) {
            throw "Windows build output not found: $source"
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "$source/*" -DestinationPath "dist/$env:PACKAGE_NAME" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_name }}
          path: dist/${{ steps.meta.outputs.package_name }}
          if-no-files-found: error
