name: Build All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  windows:
    name: Windows x64
    uses: ./.github/workflows/build-windows.yml

  android:
    name: Android APK
    uses: ./.github/workflows/build-android.yml
    secrets: inherit

  linux:
    name: Linux x64
    uses: ./.github/workflows/build-linux.yml
